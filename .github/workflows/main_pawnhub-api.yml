name: Deploy PHP app to Azure Web App - pawnhub-api

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1A93CD7031654AB394A049CB0327DF27 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8CE0C4E2BED4492DBB68D6D184FA47C4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_68BBF669234E4733941B0E4023CB86A5 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pawnhub-api'
          slot-name: 'Production'
          package: .
